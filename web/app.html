<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>InheritVault dashboard</title>
<style>
  :root{
    --bg:#08090d; --bg2:#0e1017; --card:#12151e; --line:#20243255;
    --tx:#eaedf5; --tx2:#98a1b5; --acc:#5b8def; --acc2:#8b5cff;
    --ok:#37c98b; --warn:#f0a93b; --danger:#ef5b6b; --gold:#f6c453; --radius:16px;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f8fc; --bg2:#eef2f9; --card:#ffffff; --line:#e4e9f2;
      --tx:#0f1420; --tx2:#586074; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--tx);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:var(--acc);text-decoration:none}
  canvas#bg{position:fixed;inset:0;z-index:0;opacity:.4;pointer-events:none}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px;position:relative;z-index:2}

  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
  .logo svg{width:30px;height:30px;filter:drop-shadow(0 3px 8px #5b8def40)}
  .logo b span{background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}

  header{border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 80%,transparent);
    backdrop-filter:blur(12px);position:sticky;top:0;z-index:30}
  nav{display:flex;align-items:center;justify-content:space-between;height:66px}
  .demo-badge{font-size:12px;color:var(--warn);border:1px solid var(--line);border-radius:999px;padding:4px 11px;margin-left:6px}
  .live{font-size:13px;color:var(--tx2)}

  main{padding:30px 0 70px}
  .row{display:grid;grid-template-columns:1.25fr 1fr;gap:20px}
  @media(max-width:780px){.row{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px}
  .card h2{font-size:13px;color:var(--tx2);font-weight:700;margin-bottom:18px;text-transform:uppercase;letter-spacing:.08em}

  .vaulttop{display:flex;gap:26px;align-items:center}
  @media(max-width:480px){.vaulttop{flex-direction:column;text-align:center}}
  .ring{width:150px;height:150px;flex:0 0 auto;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .rbg{fill:none;stroke:var(--bg2);stroke-width:11}
  .ring .rfg{fill:none;stroke:url(#rg);stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset .5s,stroke .3s}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .ctr .t{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
  .ring .ctr .l{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em}

  .status{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;padding:6px 13px;border-radius:999px;border:1px solid var(--line)}
  .status .d{width:8px;height:8px;border-radius:50%}
  .s-active{color:var(--ok)}.s-active .d{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .s-claimable{color:var(--warn)}.s-claimable .d{background:var(--warn);box-shadow:0 0 8px var(--warn)}
  .s-claimed{color:var(--tx2)}.s-claimed .d{background:var(--tx2)}
  .bal{font-size:38px;font-weight:800;letter-spacing:-.02em;margin:10px 0 2px}
  .bal small{font-size:17px;color:var(--tx2);font-weight:600}
  .muted{color:var(--tx2);font-size:13.5px}

  .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:22px}
  button{font-family:inherit;font-size:14px;font-weight:600;padding:12px 14px;border-radius:11px;
    border:1px solid var(--line);background:var(--card);color:var(--tx);cursor:pointer;transition:.18s;
    display:flex;align-items:center;justify-content:center;gap:7px}
  button:hover:not(:disabled){border-color:var(--acc);transform:translateY(-2px)}
  button.primary{background:linear-gradient(120deg,var(--acc),var(--acc2));color:#fff;border:none}
  button.warn{background:transparent;border-color:var(--warn);color:var(--warn)}
  button.claim{grid-column:1/-1;background:linear-gradient(120deg,var(--gold),#e0a020);color:#3a2600;border:none;font-weight:800}
  button:disabled{opacity:.4;cursor:not-allowed}

  .heirs{display:flex;flex-direction:column;gap:11px}
  .heir{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--bg2);border-radius:12px}
  .av{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-weight:700;color:#fff;font-size:14px}
  .heir .nm{font-size:14px;font-weight:600}.heir .addr{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--tx2)}
  .heir .r{margin-left:auto;text-align:right}.heir .amt{font-weight:700;font-size:14px}.heir .pct{font-size:12px;color:var(--tx2)}

  .log{list-style:none;display:flex;flex-direction:column;gap:10px;max-height:250px;overflow:auto}
  .log li{font-size:13.5px;color:var(--tx2);display:flex;gap:9px;padding-bottom:10px;border-bottom:1px solid var(--line);animation:fade .4s}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
  .log li b{color:var(--tx);font-weight:600}.log .t{color:var(--acc);flex:0 0 auto;font-variant-numeric:tabular-nums}
  .payout{background:color-mix(in srgb,var(--gold) 14%,transparent);border:1px solid var(--gold);
    border-radius:12px;padding:14px 16px;margin-top:16px;font-size:14px;display:none;animation:pop .4s}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

  .overlay{position:fixed;inset:0;z-index:60;background:#000000aa;backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.on{display:flex;animation:fade .2s}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;width:100%;max-width:380px;animation:pop .25s}
  .modal h3{font-size:19px;margin-bottom:6px}.modal p{color:var(--tx2);font-size:14px;margin-bottom:18px}
  .modal input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:var(--bg2);
    color:var(--tx);font-size:20px;font-weight:700;text-align:center}
  .modal input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 4px #5b8def25}
  .modal .mbtns{display:flex;gap:10px;margin-top:18px}.modal .mbtns button{flex:1}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="ivg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8def"/><stop offset="1" stop-color="#8b5cff"/></linearGradient>
  <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8def"/><stop offset="1" stop-color="#8b5cff"/></linearGradient>
</defs></svg>

<header><div class="wrap"><nav>
  <a class="logo" href="index.html"><svg viewBox="0 0 48 48"><path d="M24 3l18 7v13c0 11-8 19-18 22C14 42 6 34 6 23V10l18-7z" fill="url(#ivg)"/><path d="M24 17a5 5 0 00-2 9.6V31a2 2 0 004 0v-4.4A5 5 0 0024 17z" fill="#fff"/></svg><b>Inherit<span>Vault</span></b></a>
  <span class="demo-badge">interactive demo</span>
  <div style="flex:1"></div>
  <div class="live">Live contract: <a id="live" target="_blank" rel="noopener">on testnet ↗</a></div>
</nav></div></header>

<main><div class="wrap">
  <div class="row">
    <div class="card">
      <h2>Your vault</h2>
      <div class="vaulttop">
        <div class="ring">
          <svg viewBox="0 0 150 150"><circle class="rbg" cx="75" cy="75" r="65"/><circle class="rfg" id="rfg" cx="75" cy="75" r="65"/></svg>
          <div class="ctr"><div class="t" id="count">01:00</div><div class="l" id="ringlab">until claim</div></div>
        </div>
        <div>
          <span id="status" class="status s-active"><span class="d"></span> Active</span>
          <div class="bal"><span id="bal">5.00</span> <small>XLM</small></div>
          <div class="muted" id="checkinfo">Last check-in just now</div>
        </div>
      </div>
      <div class="btns">
        <button class="primary" onclick="checkIn()">✓ Check in</button>
        <button onclick="openModal('deposit')">↓ Deposit</button>
        <button onclick="openModal('withdraw')">↑ Withdraw</button>
        <button class="warn" onclick="goSilent()">Simulate silence</button>
        <button class="claim" id="claimBtn" onclick="claim()" disabled>Claim &amp; distribute to heirs</button>
      </div>
      <div class="payout" id="payout"></div>
    </div>

    <div class="card">
      <h2>Beneficiaries</h2>
      <div class="heirs" id="heirs"></div>
      <h2 style="margin-top:24px">Activity</h2>
      <ul class="log" id="log"></ul>
    </div>
  </div>
</div></main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mtitle">Deposit</h3>
    <p id="mdesc">How many XLM?</p>
    <input type="number" id="mamount" min="0" step="0.5" value="5" />
    <div class="mbtns">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="mconfirm">Confirm</button>
    </div>
  </div>
</div>

<script>
  var LIVE_CONTRACT='CAWHXHUN2UG5C7VQNIO5UAIPIINVBQKGHN5YZN62B3ZF4OKTARLO7FPZ';
  document.getElementById('live').href='https://stellar.expert/explorer/testnet/contract/'+LIVE_CONTRACT;

  var INTERVAL=60, C=2*Math.PI*65;
  document.getElementById('rfg').style.strokeDasharray=C;

  var colors=['#5b8def','#8b5cff','#37c98b','#f0a93b'];
  var state={ balance:5.0, lastCheckIn:Date.now(), claimed:false,
    heirs:[ {name:'Wallet A (spouse)',addr:'GBZW…O5QC3',bps:6000},
            {name:'Wallet B (child)', addr:'GCLD…6FVRF',bps:4000} ] };

  function now(){return Date.now();}
  function deadline(){return state.lastCheckIn+INTERVAL*1000;}
  function timeLeft(){return Math.max(0,Math.round((deadline()-now())/1000));}
  function claimable(){return !state.claimed&&now()>=deadline();}
  function fmt(t){var m=Math.floor(t/60),s=t%60;return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;}

  function log(msg){
    var li=document.createElement('li');var d=new Date();
    var s=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
    li.innerHTML='<span class="t">'+s+'</span><span>'+msg+'</span>';
    var ul=document.getElementById('log');ul.insertBefore(li,ul.firstChild);
  }
  function initials(n){return n.replace(/[^A-Za-z ]/g,'').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();}
  function renderHeirs(){
    var el=document.getElementById('heirs');el.innerHTML='';
    state.heirs.forEach(function(h,i){
      var pct=(h.bps/100).toFixed(0),amt=(state.balance*h.bps/10000);
      var d=document.createElement('div');d.className='heir';
      d.innerHTML='<div class="av" style="background:'+colors[i%4]+'">'+initials(h.name)+'</div>'+
        '<div><div class="nm">'+h.name+'</div><div class="addr">'+h.addr+'</div></div>'+
        '<div class="r"><div class="amt">'+amt.toFixed(2)+' XLM</div><div class="pct">'+pct+'%</div></div>';
      el.appendChild(d);
    });
  }
  function render(){
    document.getElementById('bal').textContent=state.balance.toFixed(2);
    var st=document.getElementById('status'),cb=document.getElementById('claimBtn'),tl=timeLeft();
    var rfg=document.getElementById('rfg'),cnt=document.getElementById('count'),lab=document.getElementById('ringlab');
    if(state.claimed){
      st.className='status s-claimed';st.innerHTML='<span class="d"></span> Claimed';
      cnt.textContent='✓';lab.textContent='distributed';rfg.style.strokeDashoffset=0;rfg.style.stroke='#37c98b';cb.disabled=true;
      document.getElementById('checkinfo').textContent='Funds distributed to beneficiaries';
    }else if(claimable()){
      st.className='status s-claimable';st.innerHTML='<span class="d"></span> Claimable';
      cnt.textContent='00:00';lab.textContent='ready';rfg.style.strokeDashoffset=0;rfg.style.stroke='var(--warn)';cb.disabled=false;
      document.getElementById('checkinfo').textContent='Owner went silent past the deadline';
    }else{
      st.className='status s-active';st.innerHTML='<span class="d"></span> Active';
      cnt.textContent=fmt(tl);lab.textContent='until claim';
      rfg.style.strokeDashoffset=C*(1-tl/INTERVAL);rfg.style.stroke='url(#rg)';cb.disabled=true;
      var since=Math.round((now()-state.lastCheckIn)/1000);
      document.getElementById('checkinfo').textContent='Last check-in '+since+'s ago, interval '+INTERVAL+'s';
    }
    renderHeirs();
  }

  function checkIn(){if(state.claimed)return;state.lastCheckIn=now();log('<b>check_in()</b> countdown reset. You are active.');render();}
  function goSilent(){if(state.claimed)return;state.lastCheckIn=now()-(INTERVAL+1)*1000;log('<b>Owner goes silent.</b> No check-in past the deadline.');render();}

  var modalMode='deposit';
  function openModal(mode){
    if(state.claimed)return;modalMode=mode;
    document.getElementById('mtitle').textContent=mode==='deposit'?'Deposit XLM':'Withdraw XLM';
    document.getElementById('mdesc').textContent=mode==='deposit'?'Add funds to the vault.':'Take funds out (also proves life).';
    document.getElementById('mamount').value=mode==='deposit'?'5':'2';
    document.getElementById('overlay').classList.add('on');
    setTimeout(function(){document.getElementById('mamount').focus();},50);
  }
  function closeModal(){document.getElementById('overlay').classList.remove('on');}
  document.getElementById('mconfirm').onclick=function(){
    var a=parseFloat(document.getElementById('mamount').value);
    if(!a||a<=0){return;}
    if(modalMode==='deposit'){state.balance+=a;log('<b>deposit()</b> +'+a.toFixed(2)+' XLM into the vault.');}
    else{ if(a>state.balance){alert('Not enough balance.');return;} state.balance-=a;state.lastCheckIn=now();
      log('<b>withdraw()</b> -'+a.toFixed(2)+' XLM (also proves life, timer reset).'); }
    closeModal();render();
  };
  document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

  function claim(){
    if(!claimable())return;
    var total=state.balance,dist=0,lines=[];
    state.heirs.forEach(function(h,i){
      var amt=i===state.heirs.length-1?(total-dist):Math.floor(total*h.bps/10000*100)/100;
      dist+=amt;lines.push('<b>'+h.name+'</b> received '+amt.toFixed(2)+' XLM');
    });
    state.balance=0;state.claimed=true;
    log('<b>claim()</b> permissionless payout executed. Vault emptied.');
    var p=document.getElementById('payout');p.style.display='block';
    p.innerHTML='🎉 <b>Payout complete</b><br>'+lines.join('<br>');
    render();
  }

  // particle background
  (function(){var c=document.getElementById('bg'),x=c.getContext('2d'),W,H,ps=[];
    function size(){W=c.width=innerWidth;H=c.height=innerHeight;}size();addEventListener('resize',size);
    for(var i=0;i<34;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+.6,s:Math.random()*.35+.12,o:Math.random()*.4+.15});
    function tick(){x.clearRect(0,0,W,H);for(var i=0;i<ps.length;i++){var p=ps[i];p.y-=p.s;if(p.y<-6){p.y=H+6;p.x=Math.random()*W;}
      x.globalAlpha=p.o;x.fillStyle='#7c76ff';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill();}x.globalAlpha=1;requestAnimationFrame(tick);}tick();})();

  log('Vault created, funded with 5.00 XLM, 2 beneficiaries set.');
  render();setInterval(render,1000);
</script>
</body>
</html>
